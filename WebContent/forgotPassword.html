<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="log_style.css">

    <style>
        /* Center box */
        .login-box {
            width: 350px;
            margin: 100px auto;
            padding: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Buttons layout */
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
        }

        .login-btn, .back-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .login-btn {
            background: #0099cc;
            color: white;
        }

        .back-btn {
            background: gray;
            color: white;
        }

        .back-btn:hover {
            background: #555;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Forgot Password</h2>

    <!-- ✅ Message -->
    <p id="msg"></p>

    <!-- ✅ Form -->
    <form action="/e-EYECARES/ForgotPasswordServlet" method="post">
        
        <label>Email</label>
        <input type="email" name="email" required placeholder="Enter your email">

        <div class="buttons">
            <button type="submit" class="login-btn">Reset Password</button>

            <!-- ✅ Back to Login Button -->
            <button type="button" class="back-btn" onclick="goToLogin()">Back</button>
        </div>
    </form>

</div>

<!-- ✅ JavaScript -->
<script>
const params = new URLSearchParams(window.location.search);
const msg = document.getElementById("msg");

// Show message
if (params.get("msg")) {
    msg.innerHTML = params.get("msg");

    // Color handling
    if (params.get("msg").includes("not found") || params.get("msg").includes("Error")) {
        msg.style.color = "red";
    } else {
        msg.style.color = "green";
    }
}

// Back to login function
function goToLogin() {
    window.location.href = "login.html"; 
    // OR use your path:
    // window.location.href = "/e-EYECARES/login.jsp";
}
</script>

</body>
</html>
