<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | e-EYECARE</title>
    <link rel="stylesheet" href="/e-EYECARES/reg_style.css">
    <script src="/e-EYECARES/reg_java.js"></script>

  
</head>
<body>

<div class="container">
    <div class="form-box">

        <h2>Create Account</h2>

       <form action="RegisterServlet" method="post" onsubmit="return validateForm()" novalidate>


            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" name="email" placeholder="Enter email">
            </div>

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="text" id="phone" name="phone" placeholder="Enter phone number">
            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="number" id="age" name="age" placeholder="Enter your age" min="1">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" >
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm" name="confirm" placeholder="Confirm password">
            </div>

            <div class="input-group">
                <label>Gender</label>
                <select id="gender" name="gender">
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="input-group">
                <label>User Type</label>
                <select id="role" name="role">
                    <option value="">Select</option>
                    <option value="patient">Patient</option>
                    <option value="doctor">Doctor</option>
                    
                </select>
            </div>

            <p class="error" id="errorMsg"></p>

            <button type="submit" class="btn">Register</button>

            <p class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </p>

        </form>
    </div>
</div>

</body>
</html>
