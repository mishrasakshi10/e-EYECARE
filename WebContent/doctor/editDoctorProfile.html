<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Doctor Profile | e-EYECARE</title>
    <link rel="stylesheet" href="editDoctorProfile.css">
    <script src="editDoctorProfile.js" defer></script>
</head>
<body>

<div class="container">

    <h2>Edit Your Profile</h2>

    <div class="profile-card">

        <div class="profile-left">
           <img id="profileImage" src="/e-EYECARES/images/doctor-image.jpg" alt="Doctor Image" class="profile-img">
         <label for="profilePhoto" class="custom-file-upload">
     📷 Upload Image
</label>
<input type="file" id="profilePhoto" accept="image/*" hidden>

        </div>

        <div class="profile-right">
            <div class="info-group">
                <label>Full Name</label>
                <input type="text" id="fullName">
            </div>

            <div class="info-group">
                <label>Email</label>
                <input type="email" id="email">
            </div>

            <div class="info-group">
                <label>Phone</label>
                <input type="text" id="phone">
            </div>

            <div class="info-group">
                <label>Qualification</label>
                <input type="text" id="qualification">
            </div>

            <div class="info-group">
                <label>Specialization</label>
                <input type="text" id="specialization">
            </div>

            <div class="info-group">
                <label>Experience (years)</label>
                <input type="number" id="experience">
            </div>

            <div class="info-group">
                <label>Registration No</label>
                <input type="text" id="registrationNo">
            </div>

            <div class="info-group">
                <label>Consultation Fee</label>
                <input type="number" step="0.01" id="consultationFee">
            </div>

            <div class="button-group">
                <button id="saveBtn" class="primary-btn">Save Changes</button>
                <button onclick="window.location.href='doctorProfile.html'" class="secondary-btn">Cancel</button>
            </div>
        </div>
    </div>

</div>

</body>
</html>
