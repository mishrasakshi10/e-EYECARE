<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Prescription | e-EYECARE</title>
    <link rel="stylesheet" href="writePrescriptions.css">
</head>
<body>
    <div class="container">
        <h2>Write Prescription</h2>
        <p class="info-text">Enter the Appointment ID to select the patient for this prescription.</p>

        <!-- Remove method/action, JS handles submission -->
        <form id="prescriptionForm">
            <div class="form-group">
                <label for="appointment_id">Appointment ID <span class="required">*</span></label>
                <input type="number" name="appointment_id" id="appointment_id" placeholder="Enter Appointment ID" required>
            </div>

            <div class="form-group">
                <label for="diagnosis">Diagnosis <span class="required">*</span></label>
                <textarea name="diagnosis" id="diagnosis" rows="4" placeholder="Enter diagnosis details" required></textarea>
            </div>

            <div class="form-group">
                <label for="medicines">Medicines <span class="required">*</span></label>
                <textarea name="medicines" id="medicines" rows="3" placeholder="Enter medicines (comma separated)" required></textarea>
            </div>

            <div class="form-group">
                <label for="notes">Additional Notes</label>
                <textarea name="notes" id="notes" rows="3" placeholder="Optional notes"></textarea>
            </div>

            <button type="submit" class="btn-submit">Submit Prescription</button>

             <div class="btn-group">
              <button type="button" class="btn-back" onclick="goToDashboard()">Back to Dashboard</button>
             </div>

        </form>
    </div>

    <script src="writePrescriptions.js"></script>
</body>
</html>
