<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Profile | e-EYECARE</title>

    <!-- CSS -->
    <link rel="stylesheet" href="doctorProfile.css">

    <!-- JS -->
    <script src="doctorProfile.js" defer></script>
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>e-EYECARE</h2>
            <span>Doctor Panel</span>
        </div>

        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li class="active"><a href="doctorProfile.html">My Profile</a></li>
            <li><a href="viewDoctorAppointments.html">Appointments</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">

        <!-- Top Bar -->
        <header class="top-bar">
            <div class="welcome-text">
                Welcome, <span id="nameHeader">Doctor</span>
            </div>

            <div class="top-actions">
                <label class="theme-toggle">
                    <input type="checkbox" id="themeSwitch" onchange="toggleTheme()">
                    Dark Mode
                </label>
            </div>
        </header>

        <!-- Profile Card -->
        <section class="profile-section">
            <div class="profile-card">

                <div class="profile-left">
                    <img id="profileImage" src="/e-EYECARES/images/doctor-image.jpg" alt="Doctor Image" class="profile-img">
                </div>

                <div class="profile-right">
                    <h2 id="name">Loading...</h2>

                    <div class="info-group">
                        <label>Email</label>
                        <p id="email">Loading...</p>
                    </div>

                    <div class="info-group">
                        <label>Phone</label>
                        <p id="phone">Loading...</p>
                    </div>

                    <div class="info-group">
    <label>Specialization</label>
    <p id="specialization">Loading...</p>
</div>

<div class="info-group">
    <label>Qualification</label>
    <p id="qualification">Loading...</p>
</div>

<div class="info-group">
    <label>Experience</label>
    <p id="experience">Loading...</p>
</div>

<div class="info-group">
    <label>Registration No.</label>
    <p id="registrationNo">Loading...</p>
</div>

<div class="info-group">
    <label>Consultation Fee</label>
    <p id="consultationFee">Loading...</p>
</div>

                    <div class="button-group">
                        <button class="primary-btn" onclick="editProfile()">Edit Profile</button>
                        <button class="secondary-btn" onclick="changePassword()">Change Password</button>
                    </div>


                </div>

            </div>
        </section>

    </div>

</body>
</html>
