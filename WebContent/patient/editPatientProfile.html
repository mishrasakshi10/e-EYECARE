<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient Profile | e-EYECARE</title>
    <link rel="stylesheet" href="/e-EYECARES/patient/editPatientProfile.css">
    <script src="/e-EYECARES/patient/editPatientProfile.js" defer></script>
</head>
<body>

<div class="container">

    <h2>Edit Your Profile</h2>

    <div class="profile-card">

        <div class="profile-left">
            <img src="/e-EYECARES/images/user-avatar.png" alt="Patient Image" class="profile-img" id="profileImg">
            <label for="profilePhoto" class="custom-file-upload">
     📷 Upload Image
</label>
<input type="file" id="profilePhoto" accept="image/*" hidden>
        </div>

        <div class="profile-right">
            <div class="info-group">
                <label>Full Name</label>
                <input type="text" id="fullName">
            </div>

            <div class="info-group">
                <label>Email</label>
                <input type="email" id="email">
            </div>

            <div class="info-group">
                <label>Phone</label>
                <input type="text" id="phone">
            </div>

            <div class="button-group">
                <button id="saveBtn" class="primary-btn">Save Changes</button>
                <button onclick="window.location.href='patientProfile.html'" class="secondary-btn">Cancel</button>
            </div>
        </div>

    </div>

</div>

</body>
</html>
